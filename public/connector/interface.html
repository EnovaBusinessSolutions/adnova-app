<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ADRAY Connector</title>

  <!-- ✅ Shopify App Bridge requiere esta meta -->
  <meta name="shopify-api-key" content="{{SHOPIFY_API_KEY}}" />
  <meta name="app-url" content="{{APP_URL}}" />

  <!-- ✅ Inyectar host/shop para inicializar App Bridge sin depender del querystring -->
  <meta name="shopify-host" content="{{HOST}}" />
  <meta name="shopify-shop" content="{{SHOP}}" />

  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #070A10;
      color: #fff;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: min(720px, 92vw);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 22px 22px 18px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .brand {
      font-weight: 800;
      letter-spacing: 0.3px;
      font-size: 18px;
    }
    .pill {
      font-size: 12px;
      opacity: .9;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      white-space: nowrap;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0 16px;
    }
    .kv {
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      overflow: hidden;
    }
    .k { font-size: 12px; opacity: .75; margin-bottom: 6px; }
    .v {
      font-size: 14px;
      font-weight: 600;
      word-break: break-all;
      opacity: .95;
    }
    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 10px;
    }
    button {
      border: 0;
      cursor: pointer;
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 700;
      font-size: 14px;
      background: linear-gradient(90deg, rgba(124,58,237,1), rgba(59,130,246,1));
      color: #fff;
      min-width: 190px;
    }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .ghost {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      min-width: 140px;
    }
    .hint {
      margin-top: 10px;
      font-size: 12px;
      opacity: .72;
      line-height: 1.45;
    }
    .err {
      margin-top: 10px;
      font-size: 12px;
      color: #ffb4b4;
      opacity: .95;
      display: none;
      white-space: pre-wrap;
    }
    @media (max-width: 680px) {
      .grid { grid-template-columns: 1fr; }
      .actions { justify-content: stretch; flex-direction: column; }
      button { width: 100%; }
    }
  </style>

  <!-- ✅ SELF-HOST: App Bridge UMD + Utils (para getSessionToken) -->
  <!-- (Shopify Admin suele bloquear unpkg.com, por eso lo servimos desde /connector/vendor/*) -->
  <script src="/connector/vendor/app-bridge.umd.js"></script>
  <script src="/connector/vendor/app-bridge-utils.umd.js"></script>

  <!-- ✅ Bootstrap estable para el conector (shop/host/apiKey/appUrl), sin tocar DOM todavía -->
  <script>
    (function () {
      function meta(name) {
        var el = document.querySelector('meta[name="' + name + '"]');
        return el ? (el.getAttribute('content') || '') : '';
      }

      var sp = new URLSearchParams(location.search);
      var shopQS = sp.get('shop') || '';
      var hostQS = sp.get('host') || '';

      var apiKey = meta('shopify-api-key');
      var appUrl = meta('app-url');

      // Preferimos lo inyectado por backend; fallback a querystring
      var shop = meta('shopify-shop') || shopQS;
      var host = meta('shopify-host') || hostQS;

      window.__ADRAY_CONNECTOR__ = {
        apiKey: apiKey,
        appUrl: appUrl,
        shop: shop,
        host: host,
        embedded: true,
        qsShop: shopQS,
        qsHost: hostQS
      };
    })();
  </script>

  <!-- ✅ Lógica E2E del conector -->
  <script src="/connector/interface.connector.js" defer></script>
</head>

<body>
  <div class="card">
    <div class="top">
      <div class="brand">ADRAY Connector</div>
      <div class="pill" id="statusPill">Preparando…</div>
    </div>

    <div class="grid">
      <div class="kv">
        <div class="k">shop</div>
        <div class="v" id="kvShop">—</div>
      </div>
      <div class="kv">
        <div class="k">host</div>
        <div class="v" id="kvHost">—</div>
      </div>
    </div>

    <div class="actions">
      <button class="ghost" id="btnReload" type="button">Recargar</button>
      <button id="btnGo" type="button" disabled>Ir a ADRAY AI</button>
    </div>

    <div class="hint">
      Este conector obtiene un <b>Session Token</b> (JWT) con App Bridge, lo guarda en <b>sessionStorage</b>
      y te redirige a <b>/onboarding</b> (rompiendo el iframe). No expone el token en la URL.
    </div>

    <div class="err" id="errBox"></div>
  </div>

  <!-- ✅ UI prefill (DOM ya existe) -->
  <script>
    (function () {
      function setText(id, v) {
        var el = document.getElementById(id);
        if (el) el.textContent = v || '—';
      }
      function setPill(text) {
        var el = document.getElementById('statusPill');
        if (el) el.textContent = text || 'Preparando…';
      }
      function showErr(msg) {
        var el = document.getElementById('errBox');
        if (!el) return;
        el.style.display = msg ? 'block' : 'none';
        el.textContent = msg || '';
      }

      var cfg = window.__ADRAY_CONNECTOR__ || {};
      setText('kvShop', cfg.shop || cfg.qsShop || '');
      setText('kvHost', cfg.host || cfg.qsHost || '');

      if (!cfg.apiKey) {
        setPill('Falta API Key');
        showErr('No se encontró meta "shopify-api-key". Verifica que el backend inyecte {{SHOPIFY_API_KEY}}.');
        return;
      }
      if (!cfg.shop) {
        setPill('Falta shop');
        showErr('No se detectó "shop". Abre desde Shopify Admin o agrega ?shop=tu-tienda.myshopify.com');
        return;
      }
      if (!cfg.host) {
        setPill('Falta host');
        showErr('No se detectó "host". App Bridge necesita el parámetro host (base64) para embedded.');
        return;
      }

      // Chequeo extra: UMD globals deben existir (self-host)
      var hasAB = !!(window['app-bridge'] && window['app-bridge'].default);
      var hasUtils = !!(window['app-bridge-utils'] && typeof window['app-bridge-utils'].getSessionToken === 'function');
      if (!hasAB || !hasUtils) {
        setPill('App Bridge no listo');
        showErr(
          'No se detectó App Bridge UMD o app-bridge-utils.\n' +
          'Verifica que existan:\n' +
          '- /connector/vendor/app-bridge.umd.js\n' +
          '- /connector/vendor/app-bridge-utils.umd.js'
        );
        return;
      }

      setPill('Listo para autenticar');
      showErr('');

      // Recargar
      var btnReload = document.getElementById('btnReload');
      if (btnReload) {
        btnReload.addEventListener('click', function () {
          try { location.reload(); } catch (e) {}
        });
      }
    })();
  </script>
</body>
</html>
