<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdRay Analytics Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
        .feed-item-enter {
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <span class="text-xl font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-md">AdRay <span class="text-gray-500 font-normal text-sm">Analytics</span></span>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div id="shop-name" class="text-sm text-gray-500 font-medium">Cargando tienda...</div>
                    <div class="h-8 w-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold" id="user-initial">?</div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Header & Controls -->
        <div class="md:flex md:items-center md:justify-between mb-8">
            <div class="flex-1 min-w-0">
                <h2 class="text-2xl font-bold leading-7 text-gray-900 sm:text-3xl sm:truncate">
                    Resumen General
                </h2>
                <div class="mt-1 flex flex-col sm:flex-row sm:flex-wrap sm:mt-0 sm:space-x-6">
                    <div class="mt-2 flex items-center text-sm text-gray-500">
                        <i class="fas fa-calendar-alt mr-1.5 text-gray-400"></i>
                        Últimos 30 días
                    </div>
                    <div class="mt-2 flex items-center text-sm text-green-600">
                        <i class="fas fa-circle mr-1.5 text-[8px] animate-pulse"></i>
                        Live Feed Activo
                    </div>
                </div>
            </div>
            <div class="mt-4 flex md:mt-0 md:ml-4 space-x-3">
                <button onclick="fetchAnalytics()" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    <i class="fas fa-sync-alt mr-2"></i> Actualizar
                </button>
            </div>
        </div>

        <!-- Metric Cards -->
        <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-4 mb-8">
            <!-- Revenue -->
            <div class="bg-white overflow-hidden shadow rounded-lg">
                <div class="p-5">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-indigo-500 rounded-md p-3">
                            <i class="fas fa-dollar-sign text-white text-lg"></i>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">Ingresos Totales</dt>
                                <dd class="flex items-baseline">
                                    <div class="text-2xl font-semibold text-gray-900" id="total-revenue">$0.00</div>
                                </dd>
                            </dl>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Orders -->
            <div class="bg-white overflow-hidden shadow rounded-lg">
                <div class="p-5">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-green-500 rounded-md p-3">
                            <i class="fas fa-shopping-cart text-white text-lg"></i>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">Pedidos Atribuidos</dt>
                                <dd class="flex items-baseline">
                                    <div class="text-2xl font-semibold text-gray-900" id="total-orders">0</div>
                                </dd>
                            </dl>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Google ROAS Proxy (Revenue / Google Orders) - Simplified for MVP -->
            <div class="bg-white overflow-hidden shadow rounded-lg">
                <div class="p-5">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-blue-500 rounded-md p-3">
                            <i class="fab fa-google text-white text-lg"></i>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">Ventas Google</dt>
                                <dd class="flex items-baseline">
                                    <div class="text-2xl font-semibold text-gray-900" id="google-revenue">$0.00</div>
                                </dd>
                            </dl>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Meta Revenue -->
            <div class="bg-white overflow-hidden shadow rounded-lg">
                <div class="p-5">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-blue-700 rounded-md p-3">
                            <i class="fab fa-facebook-f text-white text-lg"></i>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">Ventas Meta</dt>
                                <dd class="flex items-baseline">
                                    <div class="text-2xl font-semibold text-gray-900" id="meta-revenue">$0.00</div>
                                </dd>
                            </dl>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts & Feed Split -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Column: Charts (2/3 width) -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Attribution Chart -->
                <div class="bg-white shadow rounded-lg p-6">
                    <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4">Atribución por Canal</h3>
                    <div class="relative h-64">
                        <canvas id="attributionChart"></canvas>
                    </div>
                </div>

                <!-- Daily Trend Chart -->
                <div class="bg-white shadow rounded-lg p-6">
                    <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4">Tendencia Diaria (Ingresos)</h3>
                    <div class="relative h-64">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Right Column: Live Feed (1/3 width) -->
            <div class="lg:col-span-1">
                <div class="bg-white shadow rounded-lg h-full flex flex-col" style="max-height: 800px;">
                    <div class="px-6 py-4 border-b border-gray-200 bg-gray-50 rounded-t-lg flex justify-between items-center">
                        <h3 class="text-lg leading-6 font-medium text-gray-900">
                            Live Feed
                        </h3>
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                            En vivo
                        </span>
                    </div>
                    <div class="flex-1 overflow-y-auto p-4 space-y-4" id="feed-container">
                        <!-- Feed items will be injected here -->
                        <div class="text-center text-gray-400 text-sm py-8" id="feed-placeholder">
                            Esperando eventos...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentShopId = null;
        let attributionChartInstance = null;
        let trendChartInstance = null;

        // --- AUTH & INIT ---
        async function init() {
            // Check for explicit shop in URL (bypass auth)
            const urlParams = new URLSearchParams(window.location.search);
            const shopParam = urlParams.get('shop');

            if (shopParam) {
                currentShopId = shopParam;
                document.getElementById('shop-name').textContent = shopParam + ' (Demo Mode)';
                document.getElementById('user-initial').textContent = 'D';
                console.log('Skipping auth, using shop param:', shopParam);
                
                // Load data immediately
                fetchAnalytics();
                connectLiveFeed();
                return;
            }

            try {
                const res = await fetch('/api/session');
                const data = await res.json();
                
                if (!data.authenticated) {
                    window.location.href = '/login.html';
                    return;
                }

                const user = data.user;
                currentShopId = user.shop;
                
                document.getElementById('shop-name').textContent = user.shop || 'Tienda desconocida';
                document.getElementById('user-initial').textContent = (user.email || 'U')[0].toUpperCase();

                // Load initial data
                fetchAnalytics();

                // Connect SSE
                connectLiveFeed();

            } catch (error) {
                console.error('Session check failed:', error);
                window.location.href = '/login.html';
            }
        }

        // --- FETCH ANALYTICS ---
        async function fetchAnalytics() {
            if (!currentShopId) return;

            try {
                // Default: last 30 days
                const end = new Date();
                const start = new Date();
                start.setDate(start.getDate() - 30);
                
                const query = `?start=${start.toISOString()}&end=${end.toISOString()}`;
                const res = await fetch(`/api/analytics/${currentShopId}${query}`);
                
                if (!res.ok) throw new Error('Failed to fetch analytics');
                
                const data = await res.json();
                renderDashboard(data);

            } catch (error) {
                console.error('Analytics error:', error);
                alert('Error cargando datos de analítica');
            }
        }

        // --- RENDER DASHBOARD ---
        function renderDashboard(data) {
            // Metrics (Fix: match API structure)
            const summary = data.summary || { totalRevenue: 0, totalOrders: 0 };
            document.getElementById('total-revenue').textContent = formatCurrency(summary.totalRevenue);
            document.getElementById('total-orders').textContent = summary.totalOrders;
            
            // Channel Metrics (Fix: API returns object, map to array)
            const channels = data.channels || {};
            
            // Meta (often logged as 'facebook' or 'meta')
            const metaRevenue = (channels.facebook?.revenue || 0) + (channels.instagram?.revenue || 0);
            const googleRevenue = channels.google?.revenue || 0;
            
            document.getElementById('google-revenue').textContent = formatCurrency(googleRevenue);
            document.getElementById('meta-revenue').textContent = formatCurrency(metaRevenue);

            // Transform for chart
            const attributionData = Object.entries(channels).map(([key, val]) => ({
                channel: key,
                revenue: val.revenue,
                orders: val.orders
            })).filter(d => d.revenue > 0);

            // Charts
            renderAttributionChart(attributionData);
            renderTrendChart(data.daily || []);
        }

        function renderAttributionChart(attributionData) {
            const ctx = document.getElementById('attributionChart').getContext('2d');
            
            const labels = attributionData.map(d => d.channel.toUpperCase());
            const values = attributionData.map(d => d.revenue); // Use revenue for chart


            if (attributionChartInstance) attributionChartInstance.destroy();

            attributionChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: [
                            '#4F46E5', // Indigo
                            '#10B981', // Green
                            '#F59E0B', // Amber
                            '#EF4444', // Red
                            '#6B7280'  // Gray
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right' }
                    }
                }
            });
        }

        function renderTrendChart(dailyData) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            
            // Sort by date just in case
            dailyData.sort((a, b) => new Date(a.date) - new Date(b.date));

            const labels = dailyData.map(d => new Date(d.date).toLocaleDateString());
            const values = dailyData.map(d => d.revenue);

            if (trendChartInstance) trendChartInstance.destroy();

            trendChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Ingresos',
                        data: values,
                        borderColor: '#4F46E5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // --- LIVE FEED (SSE) ---
        function connectLiveFeed() {
            if (!currentShopId) return;

            const evtSource = new EventSource(`/api/feed/${currentShopId}`);
            const container = document.getElementById('feed-container');
            const placeholder = document.getElementById('feed-placeholder');

            evtSource.onmessage = function(event) {
                if (placeholder) placeholder.style.display = 'none';

                const data = JSON.parse(event.data);
                
                // Only show relevant events
                if (data.type === 'PING') return;

                const el = document.createElement('div');
                el.className = 'bg-gray-50 p-3 rounded border-l-4 feed-item-enter border-indigo-500 shadow-sm text-sm';
                
                let icon = 'fa-info-circle';
                let color = 'text-indigo-600';
                let title = data.type;
                let detail = '';

                if (data.type === 'COLLECT') {
                    icon = 'fa-mouse-pointer';
                    color = 'text-blue-500';
                    title = data.payload.eventName;
                    detail = data.payload.pageUrl ? new URL(data.payload.pageUrl).pathname : '';
                } else if (data.type === 'WEBHOOK') {
                    icon = 'fa-server';
                    color = 'text-green-600';
                    title = 'Orden Shopify';
                    detail = 'Nueva orden procesada';
                }

                el.innerHTML = `
                    <div class="flex items-start">
                        <div class="flex-shrink-0 pt-0.5">
                            <i class="fas ${icon} ${color}"></i>
                        </div>
                        <div class="ml-3 w-0 flex-1">
                            <p class="text-sm font-medium text-gray-900">${title}</p>
                            <p class="text-xs text-gray-500 truncate">${detail}</p>
                            <p class="text-[10px] text-gray-400 mt-1">${new Date().toLocaleTimeString()}</p>
                        </div>
                    </div>
                `;

                container.prepend(el);

                // Limit feed size
                if (container.children.length > 50) {
                    container.lastElementChild.remove();
                }
            };

            evtSource.onerror = function(err) {
                console.error("EventSource failed:", err);
                // SSE automatically reconnects, but can handle custom retry logic if needed
            };
        }

        // --- UTILS ---
        function formatCurrency(value) {
            return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(value);
        }

        // Start
        init();

    </script>
</body>
</html>
