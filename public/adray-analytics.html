<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to AdRay Attribution</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #f5ecff;
        background:
          radial-gradient(circle at top left, rgba(181, 92, 255, 0.18), transparent 34%),
          radial-gradient(circle at top right, rgba(79, 227, 193, 0.12), transparent 32%),
          linear-gradient(180deg, #07070a 0%, #0a0910 46%, #050507 100%);
      }

      main {
        width: min(520px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 28px;
        background: linear-gradient(180deg, rgba(23, 17, 35, 0.94) 0%, rgba(11, 10, 18, 0.97) 100%);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 36px);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      p {
        margin: 16px 0 0;
        color: rgba(245, 236, 255, 0.72);
        line-height: 1.7;
      }

      a {
        color: #e9d4ff;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        border: 1px solid rgba(181, 92, 255, 0.24);
        border-radius: 999px;
        background: rgba(181, 92, 255, 0.12);
        padding: 8px 12px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: #dbbcff;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #4fe3c1;
        box-shadow: 0 0 18px rgba(79, 227, 193, 0.55);
        animation: pulse 1.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 0.7;
        }
        50% {
          transform: scale(1.18);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">
        <span class="dot"></span>
        Redirecting
      </div>
      <h1>Opening the native Attribution dashboard</h1>
      <p>
        This legacy entry now forwards to the canonical React route at
        <strong>/dashboard/attribution</strong>.
      </p>
      <p>
        If the redirect does not happen automatically, continue to
        <a id="fallback-link" href="/dashboard/attribution">the new dashboard</a>.
      </p>
    </main>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search || "");
        params.delete("embedded");

        var target = "/dashboard/attribution";
        var query = params.toString();
        if (query) target += "?" + query;

        var fallbackLink = document.getElementById("fallback-link");
        if (fallbackLink) fallbackLink.href = target;

        try {
          if (window.top && window.top !== window) {
            try {
              window.top.location.replace(target);
              return;
            } catch (error) {
              // Fall back to the current frame if the parent cannot be redirected.
            }
          }

          window.location.replace(target);
        } catch (error) {
          if (fallbackLink) fallbackLink.textContent = "the new dashboard (" + target + ")";
        }
      })();
    </script>
  </body>
</html>
