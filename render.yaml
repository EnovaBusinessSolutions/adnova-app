services:
  - type: web
    name: adnova-ai
    env: node
    # Submódulos (p. ej. landing-adray): sin esto el directorio queda vacío y build:landing falla o queda desactualizado.
    buildCommand: git submodule update --init --recursive && npm ci && npm run build:landing && npm run build:dashboard && npx prisma generate --schema=backend/prisma/schema.prisma
    startCommand: npm run prisma:push && npm run db:backfill:layer45 && node backend/index.js
    envVars:
      - key: NODE_VERSION
        value: 20

  - type: worker
    name: adnova-ai-mcp-worker
    env: node
    buildCommand: npm ci
    startCommand: npm run worker:mcp
    envVars:
      - key: NODE_VERSION
        value: 20
