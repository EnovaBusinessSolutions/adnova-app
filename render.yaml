services:
  - type: web
    name: adnova-ai
    env: node
    buildCommand: npm cache clean --force && rm -rf /opt/render/.cache/_cacache && npm ci && npm run build:landing && npm run build:dashboard && npx prisma generate --schema=backend/prisma/schema.prisma
    startCommand: npm run prisma:push && npm run db:backfill:layer45 && node backend/index.js
    envVars:
      - key: NODE_VERSION
        value: 20

  - type: worker
    name: adnova-ai-mcp-worker
    env: node
    buildCommand: npm cache clean --force && rm -rf /opt/render/.cache/_cacache && npm ci
    startCommand: npm run worker:mcp
    envVars:
      - key: NODE_VERSION
        value: 20
